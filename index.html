<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraQuest | Warrior Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7000ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav" role="banner">
        <div class="user-stats">
            <div>
                <h2 id="player-rank">Recruit</h2>
                <div class="streak-badge">🔥 <span id="streak-count">0</span> Day Streak</div>
            </div>
            <div class="level-circle"><span id="level">1</span></div>
        </div>
        <div class="xp-wrapper">
            <div class="bar-container"><div id="xp-fill"></div></div>
            <div class="xp-text"><span id="current-xp">0</span> / <span id="next-level-xp">100</span> XP</div>
        </div>
        <button class="logout-btn" style="background:none;border:none;color:#00f2fe;font-size:0.7rem;cursor:pointer;padding:4px 8px;margin-left:10px;text-decoration:underline;" title="Logout">Logout</button>
    </header>

    <main class="dashboard" role="main">
        <div class="step-card" id="step-section" role="button" tabindex="0" aria-label="Activate step counter">
            <p class="label">PASSIVE GAINS</p>
            <h1 id="step-count">0</h1>
            <p>STEPS TODAY</p>
            <small id="step-status">Tap to Activate Sensors</small>
        </div>

        <h3 class="section-title">MUSCLE QUESTS</h3>
        <div id="workout-list"></div>

        <h3 class="section-title">RECENT GLORY</h3>
        <div id="history-list"></div>

        <button class="reset-btn" id="reset-btn">Reset Character</button>
    </main>

        </div>
        <div class="xp-wrapper">
            <div class="bar-container"><div id="xp-fill"></div></div>
            <div class="xp-text"><span id="current-xp">0</span> / <span id="next-level-xp">100</span> XP</div>
        </div>
    </header>

    <main class="dashboard" role="main">
        <div class="step-card" id="step-section" role="button" tabindex="0" aria-label="Activate step counter">
            <p class="label">PASSIVE GAINS</p>
            <h1 id="step-count">0</h1>
            <p>STEPS TODAY</p>
            <small id="step-status">Tap to Activate Sensors</small>
        </div>

        <h3 class="section-title">MUSCLE QUESTS</h3>
        <div id="workout-list"></div>

        <h3 class="section-title">RECENT GLORY</h3>
        <div id="history-list"></div>
        
         <button class="reset-btn" id="reset-btn">Reset Character</button>
    </div>

    <div id="timer-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="timer-name">
        <div class="modal-box">
            <h2 id="timer-name">EXERCISE</h2>
            <div id="countdown-display" aria-live="polite">00</div>
            <button class="quit-btn" id="quit-btn" type="button">ABANDON</button>
        </div>
    </div>

    <script src="workouts.js"></script>
    <script src="app.js"></script>
</body>
</html>
