<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AuraQuest</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .offline-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .offline-container h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--accent-cyan);
        }
        .offline-container p {
            font-size: 1.1rem;
            max-width: 400px;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }
        .offline-container button {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .offline-container button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <h1>You're offline</h1>
        <p>AuraQuest requires an internet connection for initial load. Please check your connection and try again.</p>
        <button onclick="window.location.reload()">Retry</button>
    </div>
</body>
</html>
