<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Glitch Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline'; style-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;">
</head>
<body>
    <div id="login-page">
        <div class="login-container">
            <div class="login-logo">
                <h1>AURAQUEST</h1>
                <div class="subtitle">FITNESS RPG</div>
            </div>

            <form id="loginForm" class="form-section active">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                    <div id="loginWarning" class="field-warning" role="alert" aria-live="polite"></div>
                </div>
                <button type="submit" class="btn-power" id="vanishBtn">LOGIN</button>
                <div class="form-switch">
                    <span>New to AuraQuest? <a href="#" id="signUpLink">Create Account</a></span>
                </div>
                <div class="form-switch">
                    <a href="#" id="forgetPasswordLink">Forgot Password?</a>
                </div>
            </form>

            <form id="signUpForm" class="form-section">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signUpEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signUpUsername" class="form-input" placeholder="Choose username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signUpPassword" class="form-input" placeholder="6+ characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signUpConfirmPassword" class="form-input" placeholder="Confirm password" required>
                </div>
                <div id="signUpWarning" role="alert" aria-live="polite"></div>
                <button type="submit" class="btn-power" id="signUpBtn">CREATE ACCOUNT</button>
                <div class="form-switch">
                    <span>Already have an Account? <a href="#" id="loginLink">Login</a></span>
                </div>
            </form>

            <form id="forgetPasswordForm" class="form-section">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="forgetEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                <div id="forgetWarning" role="alert" aria-live="polite"></div>
                <button type="submit" class="btn-power" id="resetBtn">SEND RESET LINK</button>
                <div class="form-switch">
                    <a href="#" id="backToLoginLink">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
