<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="dumbbellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dumbbell left weight -->
  <rect x="10" y="25" width="20" height="50" rx="5" fill="url(#dumbbellGradient)" filter="url(#glow)"/>
  <!-- Dumbbell right weight -->
  <rect x="70" y="25" width="20" height="50" rx="5" fill="url(#dumbbellGradient)" filter="url(#glow)"/>
  <!-- Dumbbell bar -->
  <rect x="25" y="43" width="50" height="14" rx="3" fill="#ffffff" filter="url(#glow)"/>
  <!-- Center knurl -->
  <rect x="42" y="43" width="16" height="14" rx="2" fill="#cccccc"/>
</svg>